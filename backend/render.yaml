# Render Blueprint — FastAPI backend + Postgres, one click.
# In Render: New → Blueprint → connect this repo. Fill the `sync: false` secrets when prompted.
# (If Render can't find this at the repo root, use the manual steps in DEPLOY.md instead — same result.)
databases:
  - name: tigbourne-db
    plan: free
    databaseName: tigbourne
    user: tigbourne

services:
  - type: web
    name: tigbourne-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: tigbourne-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INGEST_SECRET
        generateValue: true
      - key: INGEST_POLL_MINUTES
        value: "10"
      - key: CORS_ORIGINS
        sync: false # set to your deployed frontend URL, e.g. https://app.tigbourne.com
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
